name: sortlot

services:

  # ─── Nginx reverse proxy ──────────────────────────────────────────
  nginx:
    image: nginx:1.25-alpine
    ports:
      - "80:80"
    volumes:
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - ./backend:/var/www/html:ro
    depends_on:
      php:
        condition: service_healthy
      node:
        condition: service_started
    networks:
      - sortlot_network
    restart: unless-stopped

  # ─── Laravel PHP-FPM ─────────────────────────────────────────────
  php:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    volumes:
      - ./backend:/var/www/html
    environment:
      APP_ENV: local
      APP_DEBUG: "true"
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - sortlot_network
    healthcheck:
      test: ["CMD", "php", "-r", "echo 'ok';"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # ─── Laravel Horizon (queue worker) ──────────────────────────────
  horizon:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    command: php artisan horizon
    volumes:
      - ./backend:/var/www/html
    environment:
      APP_ENV: local
    depends_on:
      php:
        condition: service_healthy
    networks:
      - sortlot_network
    restart: unless-stopped

  # ─── Laravel Reverb (WebSocket server) ───────────────────────────
  reverb:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    command: php artisan reverb:start --host=0.0.0.0 --port=8080
    ports:
      - "8080:8080"
    volumes:
      - ./backend:/var/www/html
    environment:
      APP_ENV: local
    depends_on:
      php:
        condition: service_healthy
    networks:
      - sortlot_network
    restart: unless-stopped

  # ─── Next.js frontend ────────────────────────────────────────────
  node:
    image: node:20-alpine
    working_dir: /app
    volumes:
      - ./frontend:/app
      - node_modules:/app/node_modules
    command: sh -c "npm install && npm run dev"
    environment:
      NEXT_PUBLIC_API_URL: http://localhost/api/v1
      NEXT_PUBLIC_WS_HOST: localhost
      NEXT_PUBLIC_WS_PORT: "8080"
      NODE_ENV: development
    ports:
      - "3000:3000"
    networks:
      - sortlot_network
    restart: unless-stopped

  # ─── MySQL 8 ─────────────────────────────────────────────────────
  mysql:
    image: mysql:8.0
    environment:
      MYSQL_ROOT_PASSWORD: root_secret
      MYSQL_DATABASE: sortlot
      MYSQL_USER: sortlot
      MYSQL_PASSWORD: sortlot_secret
    volumes:
      - mysql_data:/var/lib/mysql
      - ./docker/mysql/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    ports:
      - "3306:3306"
    networks:
      - sortlot_network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "sortlot", "-psortlot_secret"]
      interval: 10s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  # ─── Redis ───────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    networks:
      - sortlot_network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # ─── Mailhog (local email testing) ───────────────────────────────
  mailhog:
    image: mailhog/mailhog:latest
    ports:
      - "1025:1025"   # SMTP
      - "8025:8025"   # Web UI → http://localhost:8025
    networks:
      - sortlot_network
    restart: unless-stopped

  # ─── MinIO (local S3 for file storage) ───────────────────────────
  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin123
    volumes:
      - minio_data:/data
    ports:
      - "9000:9000"   # S3 API
      - "9001:9001"   # Console → http://localhost:9001
    networks:
      - sortlot_network
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 30s
      timeout: 10s
      retries: 5
    restart: unless-stopped

volumes:
  mysql_data:
  redis_data:
  minio_data:
  node_modules:

networks:
  sortlot_network:
    driver: bridge
