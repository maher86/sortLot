name: sortlot

services:
  nginx:
    image: nginx:1.25-alpine
    ports:
      - "80:80"
    volumes:
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - ./backend:/var/www/html:ro
    depends_on:
      php:
        condition: service_started
      node:
        condition: service_started
    networks:
      - sortlot_network
    restart: unless-stopped

  php:
    build:
      context: ./backend
      dockerfile: ../docker/php/Dockerfile
    working_dir: /var/www/html
    command: sh -c "mkdir -p storage/logs bootstrap/cache && chmod -R 777 storage bootstrap/cache && php-fpm"
    volumes:
      - ./backend:/var/www/html
      - backend_vendor:/var/www/html/vendor
    environment:
      APP_ENV: local
      APP_KEY: base64:MTIzNDU2Nzg5MDEyMzQ1Njc4OTAxMjM0NTY3ODkwMTI=
      APP_DEBUG: "true"
      DB_CONNECTION: mysql
      DB_HOST: mysql
      DB_PORT: 3306
      DB_DATABASE: sortlot
      DB_USERNAME: sortlot
      DB_PASSWORD: sortlot_secret
      REDIS_HOST: redis
      REDIS_CLIENT: phpredis
      CACHE_STORE: redis
      SESSION_DRIVER: redis
      QUEUE_CONNECTION: redis
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - sortlot_network
    restart: unless-stopped

  node:
    image: node:20-alpine
    working_dir: /app
    command: sh -c "npm install --no-audit --no-fund && npm run dev"
    volumes:
      - ./frontend:/app
      - node_modules:/app/node_modules
    environment:
      NEXT_PUBLIC_API_URL: http://localhost/api/v1
      NEXT_PUBLIC_APP_URL: http://localhost
      NODE_ENV: development
    ports:
      - "3000:3000"
    networks:
      - sortlot_network
    restart: unless-stopped

  mysql:
    image: mysql:8.0
    environment:
      MYSQL_ROOT_PASSWORD: root_secret
      MYSQL_DATABASE: sortlot
      MYSQL_USER: sortlot
      MYSQL_PASSWORD: sortlot_secret
    volumes:
      - mysql_data:/var/lib/mysql
      - ./docker/mysql/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    ports:
      - "3306:3306"
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "sortlot", "-psortlot_secret"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - sortlot_network
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - sortlot_network
    restart: unless-stopped

  mailhog:
    image: mailhog/mailhog:latest
    ports:
      - "1025:1025"
      - "8025:8025"
    networks:
      - sortlot_network
    restart: unless-stopped

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin123
    volumes:
      - minio_data:/data
    ports:
      - "9000:9000"
      - "9001:9001"
    networks:
      - sortlot_network
    restart: unless-stopped

volumes:
  mysql_data:
  redis_data:
  minio_data:
  node_modules:
  backend_vendor:

networks:
  sortlot_network:
    driver: bridge
