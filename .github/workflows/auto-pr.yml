name: Auto PR on Task Branch

on:
  push:
    branches:
      - "task/**"

permissions:
  contents: read
  issues: write
  pull-requests: write

jobs:
  create-pr:
    name: Create Pull Request
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Extract task info from branch name
        id: branch
        run: |
          BRANCH="${GITHUB_REF#refs/heads/}"
          echo "branch=$BRANCH" >> "$GITHUB_OUTPUT"

          PHASE=$(echo "$BRANCH" | grep -oP 'phase-\K[0-9]+')
          STEP=$(echo "$BRANCH" | grep -oP 'step-\K[0-9]+-[0-9]+' | tr '-' '.')
          SLUG=$(echo "$BRANCH" | sed 's/task\/phase-[0-9]*-step-[0-9]*-[0-9]*-//')

          echo "phase=$PHASE" >> "$GITHUB_OUTPUT"
          echo "step=$STEP" >> "$GITHUB_OUTPUT"
          echo "slug=$SLUG" >> "$GITHUB_OUTPUT"

      - name: Read task summary from PROGRESS.md
        id: progress
        run: |
          SUMMARY=$(awk '/CURRENT STATE/{flag=1; next} /^---$/{if(flag){exit}} flag' docs/context/PROGRESS.md || echo "See PROGRESS.md for details")
          echo "summary<<EOF" >> "$GITHUB_OUTPUT"
          echo "$SUMMARY" >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"

      - name: Create Pull Request to develop
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          BRANCH: ${{ steps.branch.outputs.branch }}
          PHASE: ${{ steps.branch.outputs.phase }}
          STEP: ${{ steps.branch.outputs.step }}
          SLUG: ${{ steps.branch.outputs.slug }}
          SUMMARY: ${{ steps.progress.outputs.summary }}
        run: |
          if gh pr list --head "$BRANCH" --base develop --json number --jq '.[0].number' | grep -q '[0-9]'; then
            echo "Pull request already exists for $BRANCH"
            exit 0
          fi

          gh label create "phase-$PHASE" --color 0E8A16 --description "Phase $PHASE work" || true
          gh label create "auto-pr" --color 1D76DB --description "Created by automation" || true

          cat > pr-body.md <<EOF
          ## Task Summary
          **Phase:** $PHASE
          **Step:** $STEP
          **Task:** \`$SLUG\`

          ---
          ## Progress Context
          $SUMMARY

          ---
          ## Checklist
          - [ ] Backend PHPUnit tests passing (CI)
          - [ ] Frontend Playwright tests passing (CI)
          - [ ] PROGRESS.md updated
          - [ ] Reviewed by at least 1 person

          ---
          *Auto-generated by GitHub Actions on push to \`$BRANCH\`*
          EOF

          gh pr create \
            --base develop \
            --head "$BRANCH" \
            --title "[Phase $PHASE / Step $STEP] $SLUG" \
            --body-file pr-body.md \
            --label "phase-$PHASE" \
            --label "auto-pr"
