name: Auto PR on Task Branch

# Fires when a task branch is pushed (pattern: task/phase-X-step-Y-Z-*)
on:
  push:
    branches:
      - 'task/**'

jobs:
  create-pr:
    name: Create Pull Request
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Extract task info from branch name
        id: branch
        run: |
          BRANCH="${GITHUB_REF#refs/heads/}"
          echo "branch=$BRANCH" >> $GITHUB_OUTPUT

          # task/phase-1-step-1-1-docker-setup → Phase 1 / Step 1.1 / docker-setup
          PHASE=$(echo "$BRANCH" | grep -oP 'phase-\K[0-9]+')
          STEP=$(echo "$BRANCH" | grep -oP 'step-\K[0-9]+-[0-9]+' | tr '-' '.')
          SLUG=$(echo "$BRANCH" | sed 's/task\/phase-[0-9]*-step-[0-9]*-[0-9]*-//')

          echo "phase=$PHASE" >> $GITHUB_OUTPUT
          echo "step=$STEP" >> $GITHUB_OUTPUT
          echo "slug=$SLUG" >> $GITHUB_OUTPUT

      - name: Read task summary from PROGRESS.md
        id: progress
        run: |
          # Extract the current task description for the PR body
          SUMMARY=$(grep -A3 "Current Status" docs/context/PROGRESS.md | tail -3 || echo "See PROGRESS.md for details")
          echo "summary<<EOF" >> $GITHUB_OUTPUT
          echo "$SUMMARY" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Create Pull Request → develop
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          base: develop
          branch: ${{ steps.branch.outputs.branch }}
          title: "[Phase ${{ steps.branch.outputs.phase }} / Step ${{ steps.branch.outputs.step }}] ${{ steps.branch.outputs.slug }}"
          body: |
            ## Task Summary
            **Phase:** ${{ steps.branch.outputs.phase }}
            **Step:** ${{ steps.branch.outputs.step }}
            **Task:** `${{ steps.branch.outputs.slug }}`

            ---
            ## Progress Context
            ${{ steps.progress.outputs.summary }}

            ---
            ## Checklist
            - [ ] Backend PHPUnit tests passing (CI)
            - [ ] Frontend Playwright tests passing (CI)
            - [ ] No N+1 queries on affected endpoints
            - [ ] PROGRESS.md updated — task checked off
            - [ ] Reviewed by at least 1 person

            ---
            *Auto-generated by GitHub Actions on push to `${{ steps.branch.outputs.branch }}`*
          labels: |
            phase-${{ steps.branch.outputs.phase }}
            auto-pr
          draft: false
