name: Auto PR on Task Branch

on:
  push:
    branches:
      - "task/**"

permissions:
  contents: read
  pull-requests: write

jobs:
  create-pr:
    name: Create Pull Request
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Create or reuse pull request
        uses: actions/github-script@v7
        with:
          script: |
            const branch = context.ref.replace("refs/heads/", "");
            const phase = branch.match(/phase-(\d+)/)?.[1] ?? "?";
            const step = branch.match(/step-(\d+)-(\d+)/);
            const stepLabel = step ? `${step[1]}.${step[2]}` : "?";
            const slug = branch.replace(/^task\/phase-\d+-step-\d+-\d+-/, "");

            const { owner, repo } = context.repo;
            const existing = await github.paginate(github.rest.pulls.list, {
              owner,
              repo,
              state: "open",
              base: "develop",
              head: `${owner}:${branch}`,
              per_page: 100,
            });

            if (existing.length > 0) {
              core.info(`Pull request already exists: ${existing[0].html_url}`);
              return;
            }

            const body = [
              "## Task Summary",
              `**Phase:** ${phase}`,
              `**Step:** ${stepLabel}`,
              `**Task:** \`${slug}\``,
              "",
              "---",
              "## Checklist",
              "- [ ] Backend PHPUnit tests passing (CI)",
              "- [ ] Frontend Playwright tests passing (CI)",
              "- [ ] PROGRESS.md updated",
              "- [ ] Reviewed by at least 1 person",
              "",
              "---",
              `Auto-generated by GitHub Actions on push to \`${branch}\`.`,
            ].join("\n");

            const created = await github.rest.pulls.create({
              owner,
              repo,
              base: "develop",
              head: branch,
              title: `[Phase ${phase} / Step ${stepLabel}] ${slug}`,
              body,
              maintainer_can_modify: true,
            });

            core.info(`Created pull request: ${created.data.html_url}`);
