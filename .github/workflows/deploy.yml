name: Deploy to Production

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      skip_tests:
        description: 'Skip tests (emergency deploy only)'
        required: false
        default: 'false'

jobs:

  # ─── Gate: both test suites must pass ─────────────────────────
  backend-tests:
    if: ${{ github.event.inputs.skip_tests != 'true' }}
    uses: ./.github/workflows/backend-tests.yml

  frontend-tests:
    if: ${{ github.event.inputs.skip_tests != 'true' }}
    uses: ./.github/workflows/frontend-tests.yml

  # ─── Deploy ───────────────────────────────────────────────────
  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    needs: [backend-tests, frontend-tests]
    if: always() && (needs.backend-tests.result == 'success' || github.event.inputs.skip_tests == 'true') && (needs.frontend-tests.result == 'success' || github.event.inputs.skip_tests == 'true')
    environment: production

    steps:
      - uses: actions/checkout@v4

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          script: |
            set -e
            cd /srv/sortlot

            echo "==> Pulling latest code..."
            git pull origin main

            echo "==> Building images..."
            docker compose -f docker-compose.prod.yml build --no-cache php node

            echo "==> Running migrations..."
            docker compose -f docker-compose.prod.yml run --rm php php artisan migrate --force

            echo "==> Restarting services (zero-downtime rolling)..."
            docker compose -f docker-compose.prod.yml up -d --remove-orphans

            echo "==> Clearing caches..."
            docker compose -f docker-compose.prod.yml exec -T php php artisan config:cache
            docker compose -f docker-compose.prod.yml exec -T php php artisan route:cache
            docker compose -f docker-compose.prod.yml exec -T php php artisan view:cache
            docker compose -f docker-compose.prod.yml exec -T php php artisan horizon:terminate

            echo "==> Health check..."
            sleep 5
            curl -f ${{ secrets.APP_URL }}/api/v1/health || (echo "HEALTH CHECK FAILED" && exit 1)

            echo "==> Deploy complete."

      - name: Notify on success
        if: success()
        uses: 8398a7/action-slack@v3
        with:
          status: success
          text: "✅ SortLot deployed to production — ${{ github.sha }}"
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        continue-on-error: true

      - name: Notify on failure
        if: failure()
        uses: 8398a7/action-slack@v3
        with:
          status: failure
          text: "🚨 SortLot deploy FAILED — ${{ github.sha }}"
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        continue-on-error: true
